<div *ngIf="product != null">
  <h2>{{ product.name }}</h2>
  <p>{{ product.description }}</p>
  <p>Price: {{ product.price }}</p>
  <p>Platform: {{ product.platform }}</p>
  <img [src]="product.img" alt="{{ product.name }}" /><br/>

  <button *ngIf="canBuy" (click)="addToCart()">Add to Cart</button>
</div>
