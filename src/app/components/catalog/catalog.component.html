<div *ngFor="let product of products">
  <h2>{{ product.name }}</h2>
  <p>{{ product.description }}</p>
  <p>Price: {{ product.price }}</p>
  <p>Platform: {{ product.platform }}</p>
  <img [src]="product.img" alt="{{ product.name }}" />
</div>

<div *ngFor="let currentData of getData()">
  <h2>{{ currentData }}</h2>
</div>
