<app-product    *ngFor="let currentProduct of products" 
                [product]="currentProduct"
                [canBuy]="false"
                [canRemove]="true"
                (onRemoveFromCart)="removeFromCart($event)"
                class="product" />


<p>VAT: {{vat()}}%</p>
<p>Total Price: {{totalPrice()}}</p>
<button (click)="raiseVat()">Raise VAT by 5%</button>
